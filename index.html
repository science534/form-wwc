<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA Community</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0a1f3a,#000814 70%);
    font-family:'Segoe UI',sans-serif;
}

/* Container */
.container{
    text-align:center;
}

/* TEXT STROKE ANIMATION */
.title{
    font-size:60px;
    font-weight:bold;
    line-height:1.1;

    color:transparent; /* isi kosong */
    -webkit-text-stroke: 2px #00aaff; /* garis biru */

    /* animasi garis */
    background: linear-gradient(90deg,#00aaff 50%,transparent 50%);
    background-size:200% 100%;
    background-position:100% 0;
    -webkit-background-clip:text;
    animation: drawText 4s ease forwards;

    text-shadow:
        0 0 10px #00aaff,
        0 0 20px #0088ff;
}

.subtitle{
    margin-top:20px;
    font-size:28px;

    color:transparent;
    -webkit-text-stroke:1.5px #00d4ff;

    background: linear-gradient(90deg,#00d4ff 50%,transparent 50%);
    background-size:200% 100%;
    background-position:100% 0;
    -webkit-background-clip:text;
    animation: drawText 5s ease forwards;

    text-shadow:
        0 0 8px #00d4ff,
        0 0 15px #0099ff;
}

@keyframes drawText{
    to{
        background-position:0 0;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">
        Welcome To ISA Community
    </div>
    <div class="subtitle">
        Indonesian Space Astronomy
    </div>
</div>

</body>
</html>
